name: Weekly strategy review

on:
  schedule:
    - cron: "0 21 * * 0" # 日曜21:00 UTC = 月曜06:00 JST
  workflow_dispatch:

permissions:
  contents: write
  models: read

concurrency:
  group: weekly-strategy
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Review data/strategy.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-strategy.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/strategy.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: weekly strategy review ($(date -u +%Y-%m-%d))"
            git push
          fi
