<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>投資コックピット Pro連携</title>
<!-- iOSホーム画面アプリ化 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="投資CP">
<meta name="theme-color" content="#0C111C">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230C111C'/%3E%3Crect x='30' y='30' width='120' height='120' rx='28' fill='%23D9A94E'/%3E%3Ctext x='90' y='118' font-size='72' font-weight='900' text-anchor='middle' fill='%230C111C' font-family='sans-serif'%3E投%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --bg:#0C111C; --panel:#141C2C; --panel-up:#1B2538; --line:#26334D;
    --brass:#D9A94E; --brass-soft:rgba(217,169,78,.13);
    --steel:#9DB0CC; --bright:#EFF3FA; --dim:#5C6E8C;
    --up:#5FBF8F; --down:#E0705E; --neutral:#7A8DB0;
    --safe-b: env(safe-area-inset-bottom, 0px);
    --safe-t: env(safe-area-inset-top, 0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:#070B12; color:var(--steel);
    font-family:'Hiragino Sans','Yu Gothic UI','Noto Sans JP',sans-serif;
    display:flex; justify-content:center; overscroll-behavior:none;
  }
  #app{width:100%; max-width:430px; min-height:100dvh; background:var(--bg);
    display:flex; flex-direction:column; position:relative;}
  button{font-family:inherit; border:none; background:none; cursor:pointer; color:inherit;}
  button:active{transform:scale(.97);}
  input{font-family:inherit;}
  input:focus{outline:1px solid var(--brass);}
  a{color:var(--brass); text-decoration:none;}

  header{position:sticky; top:0; z-index:40;
    padding:calc(12px + var(--safe-t)) 16px 12px;
    background:rgba(12,17,28,.92); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between;}
  .logo{display:flex; align-items:center; gap:8px;}
  .logo-mark{width:28px;height:28px;border-radius:8px;background:var(--brass);color:var(--bg);
    display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;}
  .logo-name{font-size:14px;font-weight:700;color:var(--bright);line-height:1;}
  .logo-sub{font-size:9px;letter-spacing:.2em;color:var(--dim);margin-top:3px;}
  .head-date{font-size:10px;color:var(--dim);text-align:right;line-height:1.4;}
  .head-date b{color:var(--up);font-weight:600;}
  .gear{font-size:18px;color:var(--dim);padding:4px;}

  main{flex:1; padding:20px 16px calc(110px + var(--safe-b)); overflow-y:auto;}

  nav.tabbar{position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:430px; z-index:40;
    padding:8px 24px calc(16px + var(--safe-b));
    background:linear-gradient(180deg, transparent, var(--bg) 35%);}
  .tabbar-inner{display:flex; border-radius:18px; padding:6px;
    background:rgba(27,37,56,.95); border:1px solid var(--line);
    backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
    box-shadow:0 8px 32px rgba(0,0,0,.5);}
  .tab-btn{flex:1; padding:8px 0; border-radius:12px; display:flex; flex-direction:column;
    align-items:center; gap:2px; color:var(--dim); transition:background .15s;}
  .tab-btn .ic{font-size:16px; line-height:1;}
  .tab-btn .lb{font-size:10px; font-weight:500;}
  .tab-btn.active{background:var(--brass-soft); color:var(--brass);}

  .kicker{font-size:10px; letter-spacing:.25em; color:var(--dim); margin-bottom:2px;}
  h2.screen-title{font-size:20px; font-weight:700; color:var(--bright);}
  .sub{font-size:11px; color:var(--dim); margin:4px 0 16px;}
  .row{display:flex; align-items:flex-end; justify-content:space-between;}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:16px; margin-bottom:10px;}
  .card-hi{background:linear-gradient(135deg,var(--panel-up),var(--panel)); border:1px solid rgba(217,169,78,.28);}
  .pill{font-size:11px; padding:6px 12px; border-radius:99px; color:var(--brass); border:1px solid rgba(217,169,78,.28);}
  .pill:disabled{opacity:.5;}
  .tag{font-size:10px; letter-spacing:.12em; padding:2px 8px; border-radius:6px; color:var(--dim); border:1px solid var(--line);}
  .chip{font-size:11px; padding:5px 9px; border-radius:99px; color:var(--brass); background:var(--brass-soft); border:1px solid rgba(217,169,78,.2); margin:2px 4px 2px 0; display:inline-block;}
  .news-title{font-size:14px; font-weight:700; color:var(--bright); margin:6px 0 4px; line-height:1.5;}
  .news-body{font-size:13px; line-height:1.7; color:var(--steel); margin-bottom:8px;}
  .news-meta{font-size:10px; color:var(--dim); display:flex; justify-content:space-between; align-items:center;}
  .notice{font-size:10px; line-height:1.7; color:var(--dim); padding:6px 4px;}
  .err{background:rgba(224,112,94,.08); border:1px solid rgba(224,112,94,.3); color:var(--steel);
    border-radius:16px; padding:14px; font-size:13px;}
  .err button{color:var(--brass); text-decoration:underline;}

  .shimmer{border-radius:18px; background:var(--panel); position:relative; overflow:hidden; margin-bottom:10px;}
  .shimmer::after{content:''; position:absolute; inset:0;
    background:linear-gradient(90deg,transparent,rgba(27,37,56,.9),transparent);
    animation:sh 1.4s infinite;}
  @keyframes sh{from{transform:translateX(-100%);}to{transform:translateX(100%);}}

  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .quote{background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:14px;}
  .quote .nm{font-size:11px; color:var(--dim); margin-bottom:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .quote .pr{font-size:16px; font-weight:700; color:var(--bright); font-variant-numeric:tabular-nums; line-height:1.2; margin-bottom:4px;}
  .quote .ch{font-size:12px; font-weight:500; font-variant-numeric:tabular-nums;}

  .seg{display:flex; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:4px; margin-bottom:14px;}
  .seg button{flex:1; padding:9px 0; border-radius:10px; font-size:12px; font-weight:600; color:var(--dim);}
  .seg button.active{background:var(--brass); color:var(--bg);}
  .seg.scenario button.active{background:transparent;}

  .sheet-bg{position:fixed; inset:0; z-index:50; background:rgba(0,0,0,.65);
    backdrop-filter:blur(2px); -webkit-backdrop-filter:blur(2px);
    display:flex; align-items:flex-end; justify-content:center;}
  .sheet{width:100%; max-width:430px; background:var(--panel-up); border:1px solid var(--line); border-bottom:none;
    border-radius:24px 24px 0 0; padding:18px 20px calc(28px + var(--safe-b));
    animation:slideup .22s ease-out; max-height:82dvh; overflow-y:auto;}
  @keyframes slideup{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .handle{width:40px;height:4px;border-radius:99px;background:var(--line);margin:0 auto 16px;}
  .btn-primary{width:100%; padding:13px; border-radius:14px; background:var(--brass); color:var(--bg);
    font-size:14px; font-weight:700;}
  .btn-ghost{padding:13px 20px; border-radius:14px; font-size:13px; color:var(--steel); border:1px solid var(--line);}
  .field{width:100%; background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:12px 14px; font-size:14px; color:var(--bright); margin-bottom:10px;}
  .field::placeholder{color:var(--dim);}

  .cat-scroll{display:flex; gap:6px; overflow-x:auto; padding-bottom:6px; margin-bottom:12px; -webkit-overflow-scrolling:touch;}
  .cat-scroll::-webkit-scrollbar{display:none;}
  .cat-btn{font-size:12px; padding:7px 14px; border-radius:99px; white-space:nowrap;
    background:var(--panel); border:1px solid var(--line); color:var(--dim);}
  .cat-btn.active{background:var(--brass); border-color:var(--brass); color:var(--bg); font-weight:600;}
  .g-item{width:100%; text-align:left; background:var(--panel); border:1px solid var(--line);
    border-radius:16px; padding:14px; margin-bottom:8px;}
  .g-word{font-size:14px; font-weight:700; color:var(--brass);}
  .g-def{font-size:12px; line-height:1.7; color:var(--steel); margin-top:3px;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}

  .plan-num{width:18px;height:18px;border-radius:99px;font-size:10px;display:inline-flex;
    align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
  .plan-row{display:flex; gap:8px; align-items:flex-start; margin-bottom:7px; font-size:13px; color:var(--bright);}

  /* クイズ */
  .quiz-opt{width:100%; text-align:left; background:var(--panel); border:1px solid var(--line);
    border-radius:14px; padding:13px 14px; margin-bottom:8px; font-size:13px; color:var(--bright); line-height:1.5;}
  .quiz-opt.correct{border-color:var(--up); background:rgba(95,191,143,.1);}
  .quiz-opt.wrong{border-color:var(--down); background:rgba(224,112,94,.1);}
  .badge{display:inline-flex; align-items:center; gap:4px; font-size:11px; padding:4px 10px;
    border-radius:99px; background:var(--brass-soft); color:var(--brass); border:1px solid rgba(217,169,78,.25);}

  @media (prefers-reduced-motion: reduce){*{animation:none !important; transition:none !important;}}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">
      <div class="logo-mark">投</div>
      <div><div class="logo-name">投資コックピット</div><div class="logo-sub">CLAUDE PRO LINKED</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="head-date" id="headDate"></div>
      <button class="gear" onclick="openInfo()">ⓘ</button>
    </div>
  </header>
  <main id="main"></main>
  <nav class="tabbar"><div class="tabbar-inner" id="tabbar"></div></nav>
  <div id="modal"></div>
</div>

<script>
"use strict";
/* ============================================================
   投資コックピット FREE — APIキー不要・完全無料の独立動作版
   ・ニュース: 公共の無料RSSフィード(rss2jsonの無料枠で取得)
   ・価格: CoinGecko / Frankfurter / gold-api (すべてキー不要)
   ・学習: 内蔵辞典60語 + 用語自動ハイライト + クイズ機能
   ============================================================ */

const S = {
  tab:"home", horizon:"short", scenario:"base",
  glossaryCat:"すべて", glossaryQ:"",
  aiBrief:null,
  news:null, newsLoading:false, newsError:null, newsAt:null,
  prices:null, pricesLoading:false, pricesError:null, pricesAt:null,
  quiz:null, quizAnswered:null, quizLevel:1,
};
const todayLabel = () => { const d=new Date(); return `${d.getMonth()+1}月${d.getDate()}日(${"日月火水木金土"[d.getDay()]})`; };

// ---- Claude Pro連携 ----
// claude.ai/new?q=... でプロンプトを事前入力した新規チャットを開く。
// 送信はユーザーが確認して行い、利用量はProプランの範囲で消費される(API課金なし)。
const claudeURL = (prompt) => "https://claude.ai/new?q=" + encodeURIComponent(prompt);
window.openClaude = (prompt) => { window.open(claudeURL(prompt), "_blank", "noopener"); };
window.copyPrompt = async (prompt, btn) => {
  try{
    await navigator.clipboard.writeText(prompt);
    if(btn){ const t=btn.textContent; btn.textContent="コピーしました ✓"; setTimeout(()=>{btn.textContent=t;},1500); }
  }catch(e){ alert("コピーに失敗しました。"); }
};
const PROMPTS = {
  briefing: () =>
`今日(${todayLabel()})の世界の金融市場・経済ニュースをweb検索して、個人投資家向けの朝刊ブリーフィングを作ってください。
形式:
1. 今日の市場を一言で(リード文)
2. 重要ニュース4本(それぞれ「分類/見出し/要点2文/投資への影響(追い風・逆風・混在)」)
3. 各ニュースに出てくる専門用語を1〜2個、初心者向けに解説
簡潔に、断定的な売買推奨はせず判断材料として書いてください。`,
  news: (n) =>
`次の経済ニュースについて教えてください。
「${n.title}」
1. 何が起きたのか背景から初心者向けに解説
2. 株・債券・為替・商品のどれにどんな影響がありそうか
3. 短期・中期・長期それぞれの目線で投資家が意識すべきこと
断定的な売買推奨はせず、判断材料として整理してください。`,
  term: (w) =>
`投資用語「${w}」について教えてください。
1. 初心者向けの分かりやすい説明(例え話つき)
2. いまの市場環境でなぜ重要か
3. この用語に関連して投資家がよくする失敗
簡潔にお願いします。`,
  teacher: (q) =>
`投資・経済の質問です。初心者にも分かるように、専門用語には短い補足を付けて答えてください。必要ならweb検索で最新情報も確認してください。
質問: ${q}`,
};
const nowHM = () => new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const timeAgo = (d) => {
  const m = Math.floor((Date.now()-d)/60000);
  if(m<1) return "たった今"; if(m<60) return m+"分前";
  const h = Math.floor(m/60); if(h<24) return h+"時間前";
  return Math.floor(h/24)+"日前";
};

// ============ 用語辞典(60語・拡充版) ============
const GLOSSARY = [
  {w:"インフレ",cat:"基礎",def:"モノやサービスの値段が全体的に上がり続けること。現金の価値が目減りするため、株や実物資産で守る発想が生まれる。",kw:["インフレ","物価上昇","物価高"]},
  {w:"デフレ",cat:"基礎",def:"物価が持続的に下がること。現金の価値は上がるが、企業収益と賃金が縮み経済が停滞する。",kw:["デフレ","物価下落"]},
  {w:"政策金利",cat:"基礎",def:"中央銀行が決める金利の基準。上げると景気とインフレを冷やし、下げると経済を刺激する。株・債券・為替すべての土台。",kw:["政策金利"]},
  {w:"利下げ",cat:"基礎",def:"中央銀行が政策金利を下げること。借入コストが下がり景気を刺激。一般に株やREITの追い風。",kw:["利下げ"]},
  {w:"利上げ",cat:"基礎",def:"中央銀行が政策金利を上げること。インフレを抑えるが、株や不動産には逆風になりやすい。",kw:["利上げ"]},
  {w:"FRB",cat:"基礎",def:"米連邦準備制度理事会。米国の中央銀行で、世界の金融市場に最も影響力を持つ。FOMCで金融政策を決定。",kw:["FRB","FOMC","米連邦準備"]},
  {w:"日銀",cat:"基礎",def:"日本銀行。日本の中央銀行で、政策金利や国債買い入れを通じて金融政策を運営する。",kw:["日銀","日本銀行"]},
  {w:"長期金利",cat:"基礎",def:"10年国債の利回りが代表。景気・インフレ・財政への市場の見方を映す「経済の体温計」。上昇すると高PER株や不動産に逆風。",kw:["長期金利","10年債","国債利回り"]},
  {w:"ETF",cat:"基礎",def:"上場投資信託。株のように売買できる投資信託で、指数・セクター・金など多様な対象に低コストで分散投資できる。",kw:["ETF","上場投資信託"]},
  {w:"REIT",cat:"基礎",def:"不動産投資信託。オフィスや物流施設などの賃料収入を投資家に分配する。金利低下局面で買われやすい。",kw:["REIT","リート"]},
  {w:"投資信託",cat:"基礎",def:"多くの投資家から集めた資金を運用のプロが株や債券に分散投資する商品。少額から分散が効く。",kw:["投資信託","投信"]},
  {w:"配当",cat:"基礎",def:"企業が利益の一部を株主に分配するお金。配当利回りは「株価に対して年何%もらえるか」。",kw:["配当","増配","減配"]},
  {w:"円高",cat:"為替",def:"円の価値が他通貨に対して上がること。輸入品が安くなる一方、輸出企業の利益を圧迫する。",kw:["円高"]},
  {w:"円安",cat:"為替",def:"円の価値が下がること。輸出企業や海外資産の円建て価値には追い風だが、輸入物価が上がり家計には逆風。",kw:["円安"]},
  {w:"為替介入",cat:"為替",def:"政府・中央銀行が通貨を売買して為替レートを動かすこと。急激な円安・円高の抑制に使われる。",kw:["為替介入","介入"]},
  {w:"ドローダウン",cat:"リスク",def:"資産が直近の最高値からどれだけ下落したか。「最悪のとき何%減ったか」で、リスク管理の核心指標。",kw:["ドローダウン"]},
  {w:"ボラティリティ",cat:"リスク",def:"価格の変動の激しさ。高いほどハイリスク。イベント(選挙・紛争・決算)前に高まりやすい。",kw:["ボラティリティ","乱高下","急変動"]},
  {w:"テールリスク",cat:"リスク",def:"確率は低いが起きると甚大な損失をもたらすリスク。戦争拡大やバブル崩壊など。事前の行動計画で備える。",kw:["テールリスク"]},
  {w:"分散投資",cat:"リスク",def:"値動きの異なる資産に分けて投資し、一つの失敗が致命傷にならないようにする基本原則。",kw:["分散投資","分散"]},
  {w:"リバランス",cat:"リスク",def:"値動きで崩れた資産配分を元の比率に戻すこと。「上がったものを売り、下がったものを買う」規律になる。",kw:["リバランス"]},
  {w:"損切り",cat:"リスク",def:"損失を限定するため、値下がりした資産を売却すること。「戻るはず」という祈りを断ち切る規律。",kw:["損切り","ロスカット"]},
  {w:"レバレッジ",cat:"リスク",def:"借入や証拠金取引で自己資金以上の投資をすること。利益も損失も拡大する諸刃の剣。",kw:["レバレッジ","信用取引"]},
  {w:"逆イールド",cat:"マクロ",def:"短期金利が長期金利を上回る異常状態。景気後退の予兆とされる。",kw:["逆イールド"]},
  {w:"スタグフレーション",cat:"マクロ",def:"景気停滞と物価上昇の同時進行。株にも債券にも厳しく、資源や金が相対的に強い。",kw:["スタグフレーション"]},
  {w:"財政赤字",cat:"マクロ",def:"政府の支出が税収を上回る状態。国債増発につながり、長期金利の上昇や通貨安の圧力になる。",kw:["財政赤字","財政悪化","国債増発"]},
  {w:"GDP",cat:"マクロ",def:"国内総生産。国の経済規模と成長率を測る最重要指標。成長率の加速・減速が市場を動かす。",kw:["GDP","国内総生産","成長率"]},

// ============ クイズ(問題バンク: data/quiz.json、進捗: localStorage) ============
let QUIZ=null, quizError=false;
const QUIZ_LEVELS=[[1,"初級"],[2,"中級"],[3,"上級"]];
const QS=(()=>{ try{ return JSON.parse(localStorage.getItem("quizStats_v2"))||{}; }catch(e){ return {}; } })();
QS.total=QS.total||0; QS.correct=QS.correct||0; QS.streak=QS.streak||0; QS.best=QS.best||0;
QS.wrong=QS.wrong||[]; QS.done=QS.done||{};
function saveQS(){ try{ localStorage.setItem("quizStats_v2", JSON.stringify(QS)); }catch(e){} }
async function loadQuiz(){
  try{
    const r = await fetch("data/quiz.json?t=" + Date.now(), { cache: "no-store" });
    if(!r.ok) throw new Error("HTTP " + r.status);
    const qs = (await r.json()).questions;
    if(!Array.isArray(qs) || !qs.length) throw new Error("bad format");
    QUIZ = qs;
    QS.wrong = QS.wrong.filter(id=>qs.some(q=>q.id===id)); // 削除された問題を掃除
  }catch(e){ quizError=true; }
  render();
}
function quizRank(){
  const t=QS.total, a=t?QS.correct/t:0;
  if(t>=90&&a>=.85) return "殿堂入り投資家";
  if(t>=70&&a>=.8)  return "ファンドマネージャー";
  if(t>=45&&a>=.7)  return "シニアアナリスト";
  if(t>=25&&a>=.6)  return "アナリスト";
  if(t>=10) return "駆け出しトレーダー";
  return "見習い";
}
// 出題: 復習モードは間違えた問題から、通常は「間違えた>未回答>正解済み」の重みで抽選
function makeQuiz(){
  if(!QUIZ) return null;
  const pool = S.quizLevel==="review"
    ? QUIZ.filter(q=>QS.wrong.includes(q.id))
    : QUIZ.filter(q=>q.level===S.quizLevel);
  if(!pool.length) return null;
  const cand = pool.filter(q=>!S.quiz||q.id!==S.quiz.id);
  const list = cand.length?cand:pool;
  const weight = q => QS.wrong.includes(q.id)?4 : !QS.done[q.id]?3 : 1;
  let r = Math.random()*list.reduce((a,q)=>a+weight(q),0), chosen=list[0];
  for(const q of list){ r-=weight(q); if(r<=0){ chosen=q; break; } }
  // opts[0]が正解の形式で保存されているため、表示用にシャッフル
  const opts = chosen.opts.map((t,i)=>({t, correct:i===0})).sort(()=>Math.random()-.5);
  return {id:chosen.id, level:chosen.level, q:chosen.q, exp:chosen.exp, opts};
}

// ============ ニュース取得(無料RSS) ============
// rss2json.comの無料エンドポイント経由で公共RSSをJSON化(キー不要・回数制限あり)
const FEEDS = [
  {name:"NHK 経済", url:"https://www.nhk.or.jp/rss/news/cat5.xml"},
  {name:"NHK 国際", url:"https://www.nhk.or.jp/rss/news/cat6.xml"},
];
function detectTerms(text){
  const found=[]; const seen=new Set();
  for(const g of GLOSSARY){
    for(const k of g.kw){
      if(text.includes(k) && !seen.has(g.w)){ found.push(g.w); seen.add(g.w); break; }
    }
    if(found.length>=3) break;
  }
  return found;
}
function detectImpact(text){
  const up=["上昇","最高値","好調","増益","回復","反発","急伸","買い"];
  const down=["下落","急落","懸念","悪化","減益","不安","売り","安値","リスク"];
  const u=up.some(w=>text.includes(w)), d=down.some(w=>text.includes(w));
  return u&&d?"mixed":u?"up":d?"down":"mixed";
}
async function fetchNews(force=false){
  const key="news:cache";
  if(!force){
    try{
      const c=JSON.parse(localStorage.getItem(key)||"null");
      if(c && Date.now()-c.ts < 30*60*1000){ S.news=c.data; S.newsAt=c.at; render(); return; }
    }catch(e){}
  }
  S.newsLoading=true; S.newsError=null; render();
  try{
    const results = await Promise.allSettled(FEEDS.map(async f=>{
      const r = await fetch("https://api.rss2json.com/v1/api.json?rss_url="+encodeURIComponent(f.url));
      const j = await r.json();
      if(j.status!=="ok") throw new Error("feed");
      return (j.items||[]).slice(0,6).map(it=>({
        src:f.name, title:it.title, link:it.link,
        desc:(it.description||"").replace(/<[^>]+>/g,"").slice(0,120),
        date:new Date(it.pubDate).getTime(),
      }));
    }));
    let items = results.filter(r=>r.status==="fulfilled").flatMap(r=>r.value);
    if(items.length===0) throw new Error("all failed");
    items.sort((a,b)=>b.date-a.date);
    items = items.slice(0,10).map(it=>({
      ...it,
      terms:detectTerms(it.title+it.desc),
      impact:detectImpact(it.title+it.desc),
    }));
    S.news=items; S.newsAt=nowHM();
    localStorage.setItem(key, JSON.stringify({data:items, at:S.newsAt, ts:Date.now()}));
  }catch(e){
    S.newsError=true;
  }
  S.newsLoading=false; render();
}

// ============ 価格取得(キー不要API) ============
async function fetchPrices(force=false){
  const key="prices:cache";
  if(!force){
    try{
      const c=JSON.parse(localStorage.getItem(key)||"null");
      if(c && Date.now()-c.ts < 10*60*1000){ S.prices=c.data; S.pricesAt=c.at; render(); return; }
    }catch(e){}
  }
  S.pricesLoading=true; S.pricesError=null; render();
  const out=[];
  const jobs = [
    // 暗号資産(CoinGecko: 24h変化率つき)
    (async()=>{
      const r=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=jpy&include_24hr_change=true");
      const j=await r.json();
      const b=j.bitcoin, e=j.ethereum;
      out.push({name:"ビットコイン",price:"¥"+Math.round(b.jpy).toLocaleString(),chg:(b.jpy_24h_change>=0?"+":"")+b.jpy_24h_change.toFixed(1)+"% (24h)",dir:b.jpy_24h_change>=0?"up":"down"});
      out.push({name:"イーサリアム",price:"¥"+Math.round(e.jpy).toLocaleString(),chg:(e.jpy_24h_change>=0?"+":"")+e.jpy_24h_change.toFixed(1)+"% (24h)",dir:e.jpy_24h_change>=0?"up":"down"});
    })(),
    // 為替(Frankfurter: 当日と前営業日を比較)
    (async()=>{
      const [r1,r2]=await Promise.all([
        fetch("https://api.frankfurter.app/latest?from=USD&to=JPY,EUR"),
        fetch("https://api.frankfurter.app/latest?from=EUR&to=JPY"),
      ]);
      const j1=await r1.json(), j2=await r2.json();
      out.push({name:"ドル円 (USD/JPY)",price:j1.rates.JPY.toFixed(2)+" 円",chg:"ECB日次レート",dir:"flat"});
      out.push({name:"ユーロ円 (EUR/JPY)",price:j2.rates.JPY.toFixed(2)+" 円",chg:"ECB日次レート",dir:"flat"});
    })(),
    // 金・銀(gold-api: キー不要)
    (async()=>{
      const [rg,rs]=await Promise.all([
        fetch("https://api.gold-api.com/price/XAU"),
        fetch("https://api.gold-api.com/price/XAG"),
      ]);
      const g=await rg.json(), s=await rs.json();
      out.push({name:"金 (XAU/USD)",price:"$"+Math.round(g.price).toLocaleString(),chg:"スポット",dir:"flat"});
      out.push({name:"銀 (XAG/USD)",price:"$"+s.price.toFixed(2),chg:"スポット",dir:"flat"});
    })(),
  ];
  await Promise.allSettled(jobs);
  if(out.length===0){ S.pricesError=true; }
  else{
    // 表示順を安定させる
    const order=["ビットコイン","イーサリアム","ドル円 (USD/JPY)","ユーロ円 (EUR/JPY)","金 (XAU/USD)","銀 (XAG/USD)"];
    out.sort((a,b)=>order.indexOf(a.name)-order.indexOf(b.name));
    S.prices=out; S.pricesAt=nowHM();
    localStorage.setItem(key, JSON.stringify({data:out, at:S.pricesAt, ts:Date.now()}));
  }
  S.pricesLoading=false; render();
}

        <div class="news-meta">
          <span>${timeAgo(n.date)}</span>
          <span style="display:flex;gap:12px">
            <button style="color:var(--brass);font-size:10px" onclick='openClaude(${esc(JSON.stringify(PROMPTS.news(n)))})'>✦ Claudeで解説</button>
            <a href="${esc(n.link)}" target="_blank" rel="noopener">全文を読む →</a>
          </span>
        </div>
      </article>`).join("") +
      `<p class="notice">出典: NHKニュースRSS(無料公開フィード)。見出しに含まれる用語を自動検出して解説チップを表示しています。「追い風?/逆風?」は見出しの語句からの簡易判定で、参考程度にご覧ください。</p>`;
  } else {
    body=`<div class="card"><p class="news-body">「↻ 更新」で最新ニュースを取得します。</p></div>`;
  }
  return `
    <div class="row">
      <div><div class="kicker">DAILY NEWS</div><h2 class="screen-title">今日の経済ニュース</h2></div>
      <button class="pill" onclick="fetchNews(true)" ${S.newsLoading?"disabled":""}>${S.newsLoading?"更新中…":"↻ 更新"}</button>
    </div>
    <div class="sub">${todayLabel()}${S.newsAt?` ・ ${S.newsAt} 取得 ・ 30分キャッシュ`:""}</div>
    ${body}`;
}

function renderMarket(){
  let body="";
  if(S.pricesLoading){
    body=`<div class="grid2">${'<div class="shimmer" style="height:92px;margin:0"></div>'.repeat(6)}</div>`;
  } else if(S.pricesError){
    body=`<div class="err">価格データの取得に失敗しました。<button onclick="fetchPrices(true)">再試行</button></div>`;
  } else if(S.prices){
    const arrow=d=>d==="up"?"▲":d==="down"?"▼":"–";
    const col=d=>d==="up"?"var(--up)":d==="down"?"var(--down)":"var(--dim)";
    body=`<div class="grid2">`+S.prices.map(p=>`
      <div class="quote">
        <div class="nm">${esc(p.name)}</div>
        <div class="pr">${esc(p.price)}</div>
        <div class="ch" style="color:${col(p.dir)}">${arrow(p.dir)} ${esc(p.chg)}</div>
      </div>`).join("")+`</div>
      <div class="card" style="margin-top:12px">
        <div style="font-size:12px;font-weight:600;color:var(--brass);margin-bottom:8px">株価指数を見るには</div>
        <p class="news-body" style="margin:0">日経平均・S&P500などの指数はキー不要APIでの安定配信がないため、下の公式無料ページを利用してください(ブックマーク推奨)。</p>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px">
          <a class="pill" href="https://www.google.com/finance/quote/NI225:INDEXNIKKEI" target="_blank" rel="noopener">日経平均</a>
          <a class="pill" href="https://www.google.com/finance/quote/.INX:INDEXSP" target="_blank" rel="noopener">S&P500</a>
          <a class="pill" href="https://www.google.com/finance/quote/.IXIC:INDEXNASDAQ" target="_blank" rel="noopener">NASDAQ</a>
          <a class="pill" href="https://www.google.com/finance/quote/CL=F:NYMEX" target="_blank" rel="noopener">WTI原油</a>
        </div>
      </div>
      <p class="notice">BTC/ETH: CoinGecko、為替: 欧州中銀(Frankfurter)、金/銀: gold-api。すべて無料・キー不要の公開データです。遅延・誤差を含む参考値のため、売買時は証券会社の情報をご確認ください。</p>`;
  } else {
    body=`<div class="card"><p class="news-body">「↻ 更新」で最新価格を取得します。</p></div>`;

  return `
    <div class="row">
      <div><div class="kicker">FREE MARKETS</div><h2 class="screen-title">市況ボード</h2></div>

    </div>
    <div class="sub">${S.pricesAt?`${S.pricesAt} 取得 ・ 10分キャッシュ`:"キー不要の公開APIから取得します"}</div>

}

function renderStrategy(){
  const head=`
    <div class="kicker">STRATEGY</div>
    <h2 class="screen-title" style="margin-bottom:14px">時間軸とシナリオ</h2>`;
  if(!STRATEGY){
    return head + `<div class="card"><p class="news-body">${strategyError
      ? "戦略データ(data/strategy.json)を読み込めませんでした。GitHub Pages上でご利用ください。"
      : "戦略データを読み込み中…"}</p></div>`;
  }
  const HORIZONS=STRATEGY.horizons, SCENARIOS=STRATEGY.scenarios;
  const h=HORIZONS[S.horizon]||HORIZONS.short;
  const sc=SCENARIOS.find(s=>s.key===S.scenario)||SCENARIOS[0];
  const upd=STRATEGY.updatedAt?new Date(STRATEGY.updatedAt).toLocaleDateString("ja-JP"):"";
  return head + `
    <div class="seg">${Object.entries(HORIZONS).map(([k,v])=>
      `<button class="${S.horizon===k?"active":""}" onclick="setHorizon('${k}')">${v.label} <span style="font-weight:400;opacity:.7">${v.range}</span></button>`).join("")}
    </div>
    <div class="card card-hi"><div style="font-size:13px;line-height:1.7;color:var(--bright)">${h.thesis}</div></div>
    ${h.items.map(s=>`
      <div class="card">
        <div class="news-title" style="margin-top:0">${s.t}</div>
        <p class="news-body">${s.d}</p>
        <div>${chipsHTML(s.terms)}</div>
      </div>`).join("")}
    <div class="kicker" style="margin:24px 0 8px">SCENARIO PLANNING</div>
    <div class="seg scenario">${SCENARIOS.map(s=>
      `<button class="${S.scenario===s.key?"active":""}" onclick="setScenario('${s.key}')"
        style="${S.scenario===s.key?`background:${s.raw}22;border:1px solid ${s.raw};color:${s.raw};`:""}">${s.label}${typeof s.prob==="number"?` <span style="font-weight:400;opacity:.75">${s.prob}%</span>`:""}</button>`).join("")}
    </div>
    <div class="card" style="border-color:${sc.raw}55">
      <div class="row" style="align-items:baseline">
        <div class="news-title" style="margin-top:0;color:${sc.raw}">${sc.title}</div>
        ${typeof sc.prob==="number"?`<span class="badge" style="color:${sc.raw}">想定確率 ${sc.prob}%</span>`:""}
      </div>
      <p class="news-body">${sc.d}</p>
      ${sc.plan.map((p,i)=>`<div class="plan-row"><span class="plan-num" style="background:${sc.raw}22;color:${sc.raw}">${i+1}</span><span>${p}</span></div>`).join("")}
    </div>
    <p class="notice">※ ${upd?`${upd}更新。`:""}${STRATEGY.note?`${STRATEGY.note}。`:""}シナリオ確率は最新ニュースを踏まえた週次の目安であり、将来を保証するものではありません。前提が変わったら見直してください。</p>`;
}

function renderLearn(){
  const list=GLOSSARY.filter(g=>
    (S.glossaryCat==="すべて"||g.cat===S.glossaryCat) &&
    (S.glossaryQ===""||g.w.includes(S.glossaryQ)||g.def.includes(S.glossaryQ)));
  // クイズ道場
  let quizHTML;
  if(!QUIZ){
    quizHTML=`<div class="card card-hi" style="margin-bottom:16px"><p class="news-body" style="margin:0">${quizError
      ?"クイズデータ(data/quiz.json)を読み込めませんでした。GitHub Pages上でご利用ください。"
      :"クイズを読み込み中…"}</p></div>`;
  } else {
    if(!S.quiz) S.quiz=makeQuiz();
    const q=S.quiz;
    const acc=QS.total?Math.round(QS.correct/QS.total*100):0;
    const lvName={1:"初級",2:"中級",3:"上級",review:"復習"}[S.quizLevel];
    const cleared=S.quizLevel==="review"?null:QUIZ.filter(x=>x.level===S.quizLevel&&QS.done[x.id]===1).length;
    const lvTotal=S.quizLevel==="review"?QS.wrong.length:QUIZ.filter(x=>x.level===S.quizLevel).length;
    const header=`
      <div class="row" style="align-items:center;margin-bottom:6px">
        <div style="font-size:12px;font-weight:600;color:var(--brass)">クイズ道場</div>
        <span class="badge">🎖 ${quizRank()}</span>
      </div>
      <div class="sub" style="margin-bottom:4px">🔥 連続正解 ${QS.streak}(最高 ${QS.best}) ・ 正答率 ${acc}%(${QS.correct}/${QS.total}問)</div>
      <div class="cat-scroll" style="margin:8px 0 10px">${
        QUIZ_LEVELS.map(([k,l])=>`<button class="cat-btn ${S.quizLevel===k?"active":""}" onclick="setQuizLevel(${k})">${l}</button>`).join("")
      }<button class="cat-btn ${S.quizLevel==="review"?"active":""}" onclick="setQuizLevel('review')">復習 ${QS.wrong.length}</button></div>`;
    let bodyHTML;
    if(!q){
      bodyHTML=`<p class="news-body" style="margin:0">${S.quizLevel==="review"
        ?"復習する問題はありません。間違えた問題が自動的にここに溜まります。💮"
        :"この難易度の問題がありません。"}</p>`;
    } else {
      const answered=S.quizAnswered!==null;
      const ok=answered&&q.opts[S.quizAnswered].correct;
      bodyHTML=`
        <div class="sub" style="margin-bottom:4px">${lvName}${cleared!==null?` ・ 正解済み ${cleared}/${lvTotal}問`:` ・ 残り ${lvTotal}問`}</div>
        <p class="news-body" style="color:var(--bright)">${esc(q.q)}</p>
        ${q.opts.map((o,i)=>{
          let cls="quiz-opt";
          if(answered){
            if(o.correct) cls+=" correct";
            else if(S.quizAnswered===i) cls+=" wrong";
          }
          return `<button class="${cls}" onclick="answerQuiz(${i})" ${answered?"disabled":""}>${esc(o.t)}</button>`;
        }).join("")}
        ${answered?`
          <div style="margin-top:10px;padding:10px 12px;border-left:3px solid ${ok?"var(--up)":"var(--down)"};background:${ok?"rgba(95,191,143,.07)":"rgba(224,112,94,.07)"};border-radius:0 8px 8px 0">
            <div style="font-size:12px;font-weight:700;color:${ok?"var(--up)":"var(--down)"};margin-bottom:4px">${ok?`⭕ 正解!${QS.streak>=3?` 🔥${QS.streak}連続!`:""}`:"❌ 不正解(復習リストに追加)"}</div>
            <p class="news-body" style="margin:0">💡 ${esc(q.exp)}</p>
          </div>
          <button class="btn-primary" style="margin-top:10px" onclick="nextQuiz()">次の問題へ</button>`:""}`;
    }
    quizHTML=`<div class="card card-hi" style="margin-bottom:16px">${header}${bodyHTML}</div>`;
  }
  return `
    <div class="kicker">LEARN</div>
    <h2 class="screen-title" style="margin-bottom:14px">投資用語辞典 <span style="font-size:12px;color:var(--dim);font-weight:400">全${GLOSSARY.length}語</span></h2>
    ${quizHTML}
    <input class="field" id="gq" placeholder="用語を検索(例: 金利)" value="${esc(S.glossaryQ)}" oninput="setGlossaryQ(this.value)">
    <div class="cat-scroll">${CATS.map(c=>
      `<button class="cat-btn ${S.glossaryCat===c?"active":""}" onclick="setGlossaryCat('${c}')">${c}</button>`).join("")}
    </div>
    ${list.map(g=>`
      <button class="g-item" onclick="openTerm('${esc(g.w)}')">
        <span class="g-word">${g.w}</span> <span class="tag">${g.cat}</span>
        <div class="g-def">${g.def}</div>
      </button>`).join("") || `<p class="sub" style="text-align:center;padding:24px 0">該当する用語がありません。</p>`}
    <div class="card card-hi" style="margin-top:16px">
      <div style="font-size:12px;font-weight:600;color:var(--brass);margin-bottom:8px">✦ AI先生に質問(Proプラン内)</div>
      <p class="sub" style="margin:0 0 10px">質問を入力すると、Claudeアプリがプロンプト入力済みで開きます。</p>
      <div style="display:flex;gap:8px">
        <input class="field" id="aiq" style="margin:0;flex:1;min-width:0" placeholder="例: なぜ金利が上がると株が下がるの?" onkeydown="if(event.key==='Enter')teacherToClaude()">
        <button class="btn-primary" style="width:auto;padding:0 18px" onclick="teacherToClaude()">質問</button>
      </div>
    </div>`;
}

const TABS=[
  {id:"home",label:"今日",ic:"◉",fn:renderHome},
  {id:"market",label:"市況",ic:"¥",fn:renderMarket},
  {id:"strategy",label:"戦略",ic:"♟",fn:renderStrategy},
  {id:"learn",label:"学ぶ",ic:"❖",fn:renderLearn},
];

function render(){
  $("headDate").innerHTML=`${todayLabel()}<br><b>✦ Pro連携</b>`;
  $("tabbar").innerHTML=TABS.map(t=>
    `<button class="tab-btn ${S.tab===t.id?"active":""}" onclick="setTab('${t.id}')">
      <span class="ic">${t.ic}</span><span class="lb">${t.label}</span></button>`).join("");
  $("main").innerHTML=TABS.find(t=>t.id===S.tab).fn();
}

// ============ 操作 ============
window.setTab=(t)=>{ S.tab=t; render(); window.scrollTo(0,0);
  if(t==="home"&&!S.news&&!S.newsLoading) fetchNews();
  if(t==="market"&&!S.prices&&!S.pricesLoading) fetchPrices(); };
window.setHorizon=(h)=>{ S.horizon=h; render(); };
window.setScenario=(s)=>{ S.scenario=s; render(); };
window.setGlossaryCat=(c)=>{ S.glossaryCat=c; render(); };
window.setGlossaryQ=(q)=>{ S.glossaryQ=q; render();
  const el=$("gq"); if(el){el.focus(); el.setSelectionRange(q.length,q.length);} };
window.fetchNews=fetchNews;
window.fetchPrices=fetchPrices;
window.teacherToClaude=()=>{
  const el=$("aiq"); const q=el?el.value.trim():"";
  if(!q) return;
  openClaude(PROMPTS.teacher(q));
};
window.answerQuiz=(i)=>{
  if(S.quizAnswered!==null||!S.quiz) return;
  S.quizAnswered=i;
  const q=S.quiz, ok=q.opts[i].correct;
  QS.total++;
  if(ok){
    QS.correct++; QS.streak++; QS.best=Math.max(QS.best,QS.streak);
    QS.wrong=QS.wrong.filter(id=>id!==q.id); QS.done[q.id]=1;
  }else{
    QS.streak=0;
    if(!QS.wrong.includes(q.id)) QS.wrong.push(q.id);
    QS.done[q.id]=-1;
  }
  saveQS();
  render();
};
window.nextQuiz=()=>{ S.quiz=makeQuiz(); S.quizAnswered=null; render(); };
window.setQuizLevel=(l)=>{ S.quizLevel=l; S.quiz=null; S.quizAnswered=null; render(); };

window.openTermDef=(word, def)=>{
  const local = GLOSSARY.find(x=>x.w===word);
  const d = def || (local ? local.def : "");
  $("modal").innerHTML=`
    <div class="sheet-bg" onclick="if(event.target===this)closeModal()">
      <div class="sheet">
        <div class="handle"></div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <span class="tag">用語</span>
          <span style="font-size:18px;font-weight:700;color:var(--brass)">${esc(word)}</span>
        </div>
        ${d?`<p style="font-size:14px;line-height:1.9;color:var(--steel);margin-bottom:16px">${esc(d)}</p>`:""}
        <button class="btn-primary" style="margin-bottom:8px" onclick='openClaude(${esc(JSON.stringify(PROMPTS.term(word)))})'>✦ Claudeで詳しく聞く(Pro内)</button>
        <div style="display:flex;gap:8px">
          <a class="btn-ghost" style="flex:1;text-align:center" href="https://www.google.com/search?q=${encodeURIComponent(word+" 投資 わかりやすく")}" target="_blank" rel="noopener">Webで調べる</a>
          <button class="btn-ghost" onclick="closeModal()">閉じる</button>
        </div>
      </div>
    </div>`;
};
window.openTerm=(word)=>{
  const g=GLOSSARY.find(x=>x.w===word);
  if(!g) return;
  $("modal").innerHTML=`
    <div class="sheet-bg" onclick="if(event.target===this)closeModal()">
      <div class="sheet">
        <div class="handle"></div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <span class="tag">${esc(g.cat)}</span>
          <span style="font-size:18px;font-weight:700;color:var(--brass)">${esc(g.w)}</span>
        </div>
        <p style="font-size:14px;line-height:1.9;color:var(--steel);margin-bottom:16px">${esc(g.def)}</p>
        <button class="btn-primary" style="margin-bottom:8px" onclick='openClaude(${JSON.stringify(PROMPTS.term(g.w))})'>✦ Claudeで詳しく聞く(Pro内)</button>
        <div style="display:flex;gap:8px">
          <a class="btn-ghost" style="flex:1;text-align:center" href="https://www.google.com/search?q=${encodeURIComponent(g.w+" 投資 わかりやすく")}" target="_blank" rel="noopener">Webで調べる</a>
          <button class="btn-ghost" onclick="closeModal()">閉じる</button>
        </div>
      </div>
    </div>`;
};
window.openInfo=()=>{
  $("modal").innerHTML=`
    <div class="sheet-bg" onclick="if(event.target===this)closeModal()">
      <div class="sheet">
        <div class="handle"></div>
        <div style="font-size:16px;font-weight:700;color:var(--bright);margin-bottom:10px">このアプリについて</div>
        <p class="sub" style="line-height:1.9;margin-bottom:14px">
          APIキー・追加課金が不要の「Claude Pro連携版」です。<br>
          ・ニュース/価格/辞典/クイズ: 無料の公開データと内蔵データで動作<br>
          ・✦マークのAI機能: Claudeアプリをプロンプト入力済みで開き、あなたのProプランの利用枠内で実行(API課金なし)<br>
          データはあなたの端末のブラウザ内にのみ保存されます。
        </p>
        <div style="border-top:1px solid var(--line);padding-top:14px;margin-bottom:14px">
          <div style="font-size:12px;font-weight:600;color:var(--brass);margin-bottom:8px">✦ AI機能の仕組み</div>
          <p class="sub" style="line-height:1.9">ボタンを押すとclaude.ai(またはClaudeアプリ)が開き、このアプリが組み立てた質問文がプロンプト欄に入力済みになっています。<b style="color:var(--bright)">内容を確認してから送信ボタンを押してください</b>。回答はClaude側に表示されます。うまく開かない場合は「コピー」ボタンでプロンプトをコピーし、Claudeに貼り付けてください。</p>
        </div>
        <div style="border-top:1px solid var(--line);padding-top:14px;margin-bottom:14px">
          <div style="font-size:12px;font-weight:600;color:var(--brass);margin-bottom:8px">iPhoneでアプリのように使う</div>
          <p class="sub" style="line-height:1.9">Safariでこのページを開く → 共有ボタン → 「ホーム画面に追加」。全画面・専用アイコンで起動できます。Androidは Chrome →「ホーム画面に追加」。</p>
        </div>
        <p class="notice">本アプリは情報整理と学習を支援する教育的ツールであり、特定の金融商品の売買を推奨するものではありません。「戦略」タブの内容は2026年半ば時点の市場環境を前提とした一つの整理です。投資判断はご自身の責任で行ってください。</p>
        <button class="btn-primary" style="margin-top:10px" onclick="closeModal()">閉じる</button>
      </div>
    </div>`;
};
window.closeModal=()=>{ $("modal").innerHTML=""; };

// 起動
render();
loadQuiz();
loadStrategy();
loadStaticBrief();
fetchNews();
</script>
